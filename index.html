<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACK OS</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
  overflow: hidden;
}

#boot {
  position: fixed;
  inset: 0;
  background: #020b05;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #00ff66;
  z-index: 10;
}

.logo {
  font-size: 38px;
  font-weight: bold;
  text-shadow: 0 0 20px #00ff66;
}

.loading {
  margin-top: 20px;
  font-size: 14px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

#phone {
  height: 100vh;
  padding: 12px;
  background:
    linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.35)),
    url("https://images.unsplash.com/photo-1519608487953-e999c86e7455?q=80&w=1000");
  background-size: cover;
  background-position: center;
  display: none;
}

.status {
  display: flex;
  justify-content: space-between;
  font-size: 15px;
  font-weight: bold;
}

.battery {
  border: 2px solid white;
  width: 28px;
  height: 14px;
  border-radius: 3px;
  position: relative;
  display: inline-block;
  margin-left: 5px;
}

.battery::after {
  content: "";
  position: absolute;
  right: -5px;
  top: 3px;
  width: 3px;
  height: 6px;
  background: white;
}

.battery-level {
  height: 100%;
  width: 76%;
  background: #00ff66;
}

.big-time {
  text-align: center;
  margin-top: 45px;
  font-size: 58px;
  font-weight: 300;
}

.date {
  text-align: center;
  font-size: 16px;
  opacity: 0.9;
}

.apps {
  margin-top: 70px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 22px;
  text-align: center;
}

.app {
  font-size: 12px;
  cursor: pointer;
}

.icon {
  width: 58px;
  height: 58px;
  margin: 0 auto 6px;
  border-radius: 16px;
  background: rgba(0, 255, 102, 0.18);
  border: 1px solid #00ff66;
  box-shadow: 0 0 12px #00ff66;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}

.dock {
  position: fixed;
  bottom: 18px;
  left: 16px;
  right: 16px;
  height: 76px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  border-radius: 26px;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.dock .icon {
  margin: 0;
}

.window {
  position: fixed;
  inset: 0;
  background: #020202;
  color: #00ff66;
  z-index: 30;
  display: none;
  padding: 15px;
}

.top {
  display: flex;
  align-items: center;
  gap: 15px;
  border-bottom: 1px solid #00ff66;
  padding-bottom: 12px;
  margin-bottom: 15px;
}

.back {
  background: none;
  border: none;
  color: #00ff66;
  font-size: 26px;
}

#cameraVideo {
  width: 100%;
  height: 70vh;
  background: #000;
  object-fit: cover;
  border: 1px solid #00ff66;
  border-radius: 18px;
}

.terminal {
  white-space: pre-line;
  font-family: Consolas, monospace;
  font-size: 15px;
  line-height: 1.6;
}

.red {
  color: #ff0033;
}

.password-panel {
  margin-top: 28px;
  border: 1px solid #00ff66;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 0 18px rgba(0, 255, 102, 0.28);
}

.password-label {
  margin-bottom: 8px;
  font-family: Consolas, monospace;
  font-size: 13px;
  color: #7dffad;
}

#passwordField {
  width: 100%;
  height: 58px;
  border: 1px solid #00ff66;
  border-radius: 14px;
  background: #001a09;
  color: #00ff66;
  font-family: Consolas, monospace;
  font-size: 30px;
  text-align: center;
  letter-spacing: 8px;
  outline: none;
}

.password-button {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  border: 1px solid #00ff66;
  border-radius: 14px;
  background: rgba(0, 255, 102, 0.14);
  color: #00ff66;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(0, 255, 102, 0.35);
}

.password-button:disabled {
  opacity: 0.45;
  cursor: default;
}

#passwordStatus {
  margin-top: 18px;
  min-height: 150px;
}

.signal-panel {
  margin-top: 28px;
  border: 1px solid #00ff66;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 0 18px rgba(0, 255, 102, 0.28);
}

.signal-button {
  width: 100%;
  margin-top: 14px;
  padding: 14px;
  border: 1px solid #00ff66;
  border-radius: 14px;
  background: rgba(0, 255, 102, 0.14);
  color: #00ff66;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(0, 255, 102, 0.35);
}

.signal-button:disabled {
  opacity: 0.45;
  cursor: default;
}

.signal-link {
  min-height: 50px;
  padding: 12px;
  border: 1px solid #00ff66;
  border-radius: 14px;
  background: #001a09;
  color: #7dffad;
  font-family: Consolas, monospace;
  font-size: 14px;
  word-break: break-all;
}

.map {
  position: relative;
  display: none;
  height: 310px;
  margin-top: 16px;
  overflow: hidden;
  border: 1px solid #00ff66;
  border-radius: 18px;
  background:
    linear-gradient(rgba(0, 255, 102, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 255, 102, 0.08) 1px, transparent 1px),
    radial-gradient(circle at 54% 42%, rgba(0, 255, 102, 0.18), transparent 35%),
    #020b05;
  background-size: 28px 28px, 28px 28px, auto, auto;
}

.map::before {
  display: none;
  content: "";
  position: absolute;
  inset: 24px 34px 42px 24px;
  border: 2px solid rgba(0, 255, 102, 0.48);
  border-radius: 52% 42% 48% 44%;
  transform: rotate(-8deg);
  box-shadow: inset 0 0 30px rgba(0, 255, 102, 0.16);
}

.map iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

.map-dot {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #ff0033;
  border: 2px solid white;
  box-shadow: 0 0 20px #ff0033;
  transform: translate(-50%, -50%);
}

.map-dot::after {
  content: "";
  position: absolute;
  inset: -10px;
  border: 1px solid #ff0033;
  border-radius: 50%;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  from { transform: scale(0.6); opacity: 1; }
  to { transform: scale(1.8); opacity: 0; }
}

.map-place {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 12px;
  z-index: 2;
  padding: 10px;
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.72);
  border: 1px solid rgba(0, 255, 102, 0.6);
  font-family: Consolas, monospace;
  color: #00ff66;
}
</style>
</head>

<body>

<div id="boot">
  <div class="logo">HACK OS</div>
  <div class="loading">Запуск системы...</div>
</div>

<div id="phone">
  <div class="status">
    <div id="smallTime">12:00</div>
    <div>5G <span class="battery"><span class="battery-level"></span></span></div>
  </div>

  <div class="big-time" id="bigTime">12:00</div>
  <div class="date" id="date">Воскресенье</div>

  <div class="apps">
    <div class="app" onclick="openHackApp()"><div class="icon">💀</div>Nearby Hack</div>
    <div class="app" onclick="openPasswordApp()"><div class="icon">🔐</div>Пароль</div>
    <div class="app"><div class="icon">📡</div>Scanner</div>
    <div class="app"><div class="icon">⚙️</div>Settings</div>

    <div class="app"><div class="icon">🧬</div>Matrix</div>
    <div class="app"><div class="icon">📁</div>Files</div>
    <div class="app" onclick="openSignalApp()"><div class="icon">🛰️</div>Signal</div>

    <div class="app" onclick="openTelegram()">
      <div class="icon">✈️</div>
      Dark Telegram
    </div>
  </div>

  <div class="dock">
    <div class="icon">📞</div>
    <div class="icon">💬</div>
    <div class="icon">🌐</div>
    <div class="icon" onclick="openCamera()">📷</div>
  </div>
</div>

<div id="cameraApp" class="window">
  <div class="top">
    <button class="back" onclick="closeCamera()">←</button>
    <h2>Camera</h2>
  </div>
  <video id="cameraVideo" autoplay playsinline></video>
</div>

<div id="hackApp" class="window">
  <div class="top">
    <button class="back" onclick="closeHackApp()">←</button>
    <h2>Nearby Hack</h2>
  </div>
  <div class="terminal" id="hackText"></div>
</div>

<div id="passwordApp" class="window">
  <div class="top">
    <button class="back" onclick="closePasswordApp()">←</button>
    <h2>Пароль</h2>
  </div>
  <div class="password-panel">
    <div class="password-label">Пароль телефона</div>
    <input id="passwordField" type="text" value="----" readonly>
    <button class="password-button" id="passwordButton" onclick="startPasswordPick()">Начать подбор</button>
    <div class="terminal" id="passwordStatus">Ожидание запуска...</div>
  </div>
</div>

<div id="signalApp" class="window">
  <div class="top">
    <button class="back" onclick="closeSignalApp()">←</button>
    <h2>Signal</h2>
  </div>
  <div class="signal-panel">
    <div class="signal-link" id="signalLink">Ссылка не создана</div>
    <button class="signal-button" id="createLinkButton" onclick="createSignalLink()">Создать ссылку</button>
    <button class="signal-button" id="trackSignalButton" onclick="trackSignal()" style="display:none;">Отследить</button>
    <div class="map" id="signalMap">
      <iframe id="googleMap" title="Google Maps" src="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      <div class="map-place" id="signalPlace"></div>
    </div>
  </div>
</div>

<script>
let cameraStream = null;
let passwordTimers = [];
let passwordInterval = null;
let currentSignalLink = "";

setTimeout(() => {
  document.getElementById("boot").style.display = "none";
  document.getElementById("phone").style.display = "block";
}, 3000);

function updateTime() {
  const now = new Date();
  const time = now.toLocaleTimeString("ru-RU", {
    hour: "2-digit",
    minute: "2-digit"
  });

  document.getElementById("smallTime").textContent = time;
  document.getElementById("bigTime").textContent = time;

  document.getElementById("date").textContent =
    now.toLocaleDateString("ru-RU", {
      weekday: "long",
      day: "numeric",
      month: "long"
    });
}

function openTelegram() {
  window.location.href = "https://web.telegram.org/";
}

async function openCamera() {
  document.getElementById("cameraApp").style.display = "block";

  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });

    document.getElementById("cameraVideo").srcObject = cameraStream;
  } catch (e) {
    alert("Камера не запустилась. Разреши доступ к камере в браузере.");
  }
}

function closeCamera() {
  document.getElementById("cameraApp").style.display = "none";

  if (cameraStream) {
    cameraStream.getTracks().forEach(track => track.stop());
    cameraStream = null;
  }
}

function openHackApp() {
  document.getElementById("hackApp").style.display = "block";

  const box = document.getElementById("hackText");
  box.innerHTML = "";

  const steps = [
    ["Запуск Hacker App...", 700],
    ["Инициализация модулей...", 700],
    ["Сканирование сети...", 700],
    ["Поиск маршрутизатора...", 700],
    ["Подключение...", 700],
  ];

  let i = 0;

  function printStep() {
    if (i < steps.length) {
      box.innerHTML += steps[i][0] + "\n";
      setTimeout(() => {
        i++;
        printStep();
      }, steps[i][1]);
    } else {
      runProgress();
    }
  }

  function runProgress() {
    let percent = 0;
    const progressLine = document.createElement("div");
    progressLine.textContent = "Прогресс: 0%";
    box.appendChild(progressLine);

    const timer = setInterval(() => {
      percent++;
      progressLine.textContent = "Прогресс: " + percent + "%";

      if (percent === 100) {
        clearInterval(timer);

        setTimeout(() => {
          box.innerHTML += "\nПоиск устройств в сети...\n";
        }, 5000);

        setTimeout(() => {
          box.innerHTML += "Обработка данных...\n";
        }, 10000);

        setTimeout(() => {
          box.innerHTML += "взлом...\n";
        }, 15000);

        setTimeout(() => {
          box.innerHTML += "Готово взлом завершен доступ к устройствам получен ✅.\n";
        }, 20000);
      }
    }, 35);
  }

  printStep();
}

function openPasswordApp() {
  document.getElementById("passwordApp").style.display = "block";
  resetPasswordApp();
}

function resetPasswordApp() {
  passwordTimers.forEach(timer => clearTimeout(timer));
  passwordTimers = [];

  if (passwordInterval) {
    clearInterval(passwordInterval);
    passwordInterval = null;
  }

  document.getElementById("passwordField").value = "----";
  document.getElementById("passwordStatus").textContent = "Ожидание запуска...";
  document.getElementById("passwordButton").disabled = false;
}

function randomPassword() {
  return String(Math.floor(Math.random() * 10000)).padStart(4, "0");
}

function startPasswordPick() {
  const field = document.getElementById("passwordField");
  const status = document.getElementById("passwordStatus");
  const button = document.getElementById("passwordButton");
  const finalPassword = randomPassword();

  button.disabled = true;
  status.textContent = "Запуск подбора...\n";

  let progress = 0;
  let line = "";

  passwordInterval = setInterval(() => {
    progress++;
    field.value = randomPassword();

    if (progress % 9 === 0) {
      line += "Проверка: " + field.value + " | " + progress + "%\n";
      status.textContent = line;
      status.scrollTop = status.scrollHeight;
    }

    if (progress >= 100) {
      clearInterval(passwordInterval);
      passwordInterval = null;
      field.value = finalPassword;
      status.textContent += "\nПароль найден: " + finalPassword + "\nДоступ подтвержден.";
      button.disabled = false;
    }
  }, 70);
}

function closePasswordApp() {
  document.getElementById("passwordApp").style.display = "none";
  resetPasswordApp();
}

function openSignalApp() {
  document.getElementById("signalApp").style.display = "block";
  resetSignalApp();
}

function resetSignalApp() {
  currentSignalLink = "";
  document.getElementById("signalLink").textContent = "Ссылка не создана";
  document.getElementById("createLinkButton").style.display = "block";
  document.getElementById("trackSignalButton").style.display = "none";
  document.getElementById("signalMap").style.display = "none";
  document.getElementById("signalPlace").textContent = "";
  document.getElementById("googleMap").src = "";
}

function createSignalLink() {
  const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
  let code = "";

  for (let i = 0; i < 10; i++) {
    code += chars[Math.floor(Math.random() * chars.length)];
  }

  currentSignalLink = "https://signal-link.net/" + code;
  document.getElementById("signalLink").textContent = currentSignalLink;
  document.getElementById("createLinkButton").style.display = "none";
  document.getElementById("trackSignalButton").style.display = "block";
}

function trackSignal() {
  const address = "Одесса, переулок Сергея Уточкина, 4";
  const mapUrl = "https://maps.google.com/maps?q=" + encodeURIComponent(address) + "&output=embed";

  document.getElementById("googleMap").src = mapUrl;
  document.getElementById("signalMap").style.display = "block";
  document.getElementById("signalPlace").textContent =
    "Город: Одесса | Адрес: переулок Сергея Уточкина, 4";
}

function closeSignalApp() {
  document.getElementById("signalApp").style.display = "none";
  resetSignalApp();
}

function closeHackApp() {
  document.getElementById("hackApp").style.display = "none";
}

updateTime();
setInterval(updateTime, 1000);
</script>

</body>
</html>
